version: '3.8'

services:
  ms-gateway:
    build:
        context: .
        dockerfile: ms-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://ms-auth:8081
      LEAGUES_SERVICE_URL: http://ms-leagues:8082
      TEAMS_SERVICE_URL: http://ms-teams:8083
      FIXTURES_SERVICE_URL: http://ms-fixtures:8085
      STANDINGS_SERVICE_URL: http://ms-standings:8086
      NOTIFICATIONS_SERVICE_URL: http://ms-notifications:8088
      DASHBOARD_SERVICE_URL: http://ms-dashboard:8089

  postgres-auth:
    image: postgres:15
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"

  ms-auth:
    build:
        context: .
        dockerfile: ms-auth/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - postgres-auth
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      JWT_SECRET: sportpulse-secret-key-2025-Secret
      JWT_EXPIRATION: 3600000
  
  ms-leagues:
    build:
      context: .
      dockerfile: ms-leagues/Dockerfile
    ports:
      - "8082:8082"
    environment:
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
      JWT_SECRET: sportpulse-secret-key-2025-Secret

  ms-teams:
    build:
        context: .
        dockerfile: ms-teams/Dockerfile
    ports:
      - "8083:8083"
    environment:
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
      JWT_SECRET: sportpulse-secret-key-2025-Secret
  
  ms-fixtures:
    build:
        context: .
        dockerfile: ms-fixtures/Dockerfile
    ports:
      - "8085:8085"
    environment:
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
      JWT_SECRET: sportpulse-secret-key-2025-Secret
      TEAMS_SERVICE_URL: http://ms-teams:8083

  ms-standings:
    build:
        context: .
        dockerfile: ms-standings/Dockerfile
    ports:
      - "8086:8086"
    environment:
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
      JWT_SECRET: sportpulse-secret-key-2025-Secret
      TEAMS_SERVICE_URL: http://ms-teams:8083

  postgres-notifications:
    image: postgres:15
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"

  ms-notifications:
    build:
        context: .
        dockerfile: ms-notifications/Dockerfile
    ports:
      - "8088:8088"
    depends_on:
      - postgres-notifications
      - ms-fixtures
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notifications:5432/notifications_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      JWT_SECRET: sportpulse-secret-key-2025-Secret
      FIXTURES_SERVICE_URL: http://ms-fixtures:8085
      INTERNAL_JWT_TOKEN: ${INTERNAL_JWT_TOKEN}
      
  ms-dashboard:
    build:
        context: .
        dockerfile: ms-dashboard/Dockerfile
    ports:
      - "8089:8089"
    depends_on:
      - ms-fixtures
      - ms-standings
      - ms-leagues
    environment:
      JWT_SECRET: sportpulse-secret-key-2025-Secret
      FIXTURES_SERVICE_URL: http://ms-fixtures:8085
      STANDINGS_SERVICE_URL: http://ms-standings:8086
      LEAGUES_SERVICE_URL: http://ms-leagues:8082

  external-api:
    build: ./external-api
    ports:
      - "8090:8090"