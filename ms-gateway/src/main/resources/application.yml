server:
  port: 8080

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@ipKeyResolver}"
            bucket4j-rate-limiter.capacity: 60
            bucket4j-rate-limiter.refillTokens: 60
            bucket4j-rate-limiter.refillPeriod: 60s
            bucket4j-rate-limiter.requestedTokens: 1

      routes:
        - id: auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: leagues
          uri: http://localhost:8082
          predicates:
            - Path=/api/leagues/**

        - id: teams
          uri: http://localhost:8083
          predicates:
            - Path=/api/teams/**

        - id: fixtures
          uri: http://localhost:8085
          predicates:
            - Path=/api/fixtures/**

        - id: standings
          uri: http://localhost:8086
          predicates:
            - Path=/api/standings/**

        - id: notifications
          uri: http://localhost:8088
          predicates:
            - Path=/api/notifications/**

        - id: dashboard
          uri: http://localhost:8089
          predicates:
            - Path=/api/dashboard/**

        - id: test
          uri: https://jsonplaceholder.typicode.com
          predicates:
            - Path=/todos/**