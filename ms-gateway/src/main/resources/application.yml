server:
  port: 8080

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      default-filters:
        - name: CustomRateLimiter
          args:
            bucket4j-rate-limiter.capacity: 10
            bucket4j-rate-limiter.refillTokens: 10
            bucket4j-rate-limiter.refillPeriod: 60s
            bucket4j-rate-limiter.requestedTokens: 1

      routes:
        - id: auth
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/api/auth/**

        - id: leagues
          uri: ${LEAGUES_SERVICE_URL}
          predicates:
            - Path=/api/leagues/**

        - id: teams
          uri: ${TEAMS_SERVICE_URL}
          predicates:
            - Path=/api/teams/**

        - id: fixtures
          uri: ${FIXTURES_SERVICE_URL}
          predicates:
            - Path=/api/fixtures/**

        - id: standings
          uri: ${STANDINGS_SERVICE_URL}
          predicates:
            - Path=/api/standings/**

        - id: notifications
          uri: ${NOTIFICATIONS_SERVICE_URL}
          predicates:
            - Path=/api/notifications/**

        - id: dashboard
          uri: ${DASHBOARD_SERVICE_URL}
          predicates:
            - Path=/api/dashboard/**
